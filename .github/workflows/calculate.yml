name: Calculate metrics

on:
  push:
    paths:
      - metrics.json   # only runs when this file changes

jobs:
  calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push result back

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Run calculation
        run: python calculate.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          git diff --staged --quiet || git commit -m "Update result"
          git push
